[simulation]
# Root directory for gen/ and sim_result/
output_base_path = "../data/"

# Data generation models
# Available: UNI, IC, IANC, EUCLID, GAUSS, LADDER, SPHEROID, PERTURB, UNANIMOUS, UFR, VMF_HC, VMF_HS
generative_models = ["UNI", "UNANIMOUS","EUCLID_2D"]


# Voting methods to execute
rule_codes = ["RV", "MJ", "AP_T", "BORD", "STAR" ,"BLAC","SCHU","COPE", "MMAX", "NANS", "COOM", "PLU2", "PLU1"]


candidates = [3,5,9,14]

# Numbers of voters
voters = [10,20,100,1000]

# Iterations per (model, voters, candidates) combination
iterations = 1000

# Seed for reproducibility
seed = 161
