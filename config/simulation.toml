[simulation]
# Root directory for gen/ and sim_result/
output_base_path = "../data/"

# Data generation models (codes registered in generator_registry)
# Available: UNI, IC, IANC, EUCLID, GAUSS, LADDER, SPHEROID, PERTURB, UNANIMOUS, UFR, VMF_HC, VMF_HS
generative_models = ["VMF_HC"]

# -------------------------------------------------------------------
# ACTIVE RULE SET - Choose one set below by uncommenting
# -------------------------------------------------------------------

# *** QUICK TEST SET (15 rules) ***
rule_codes = [
    "PLU1", "HARE", "BORD", "COOM", "BALD", "COPE", "SCHU", "MMAX",
    "PV-IR", "PV-BALD", "PV-COMB", "PV-NANS", "PV-CIRV", "PV-DAUN", "PV-BMF"
]

# *** UNCOMMENT BELOW FOR OTHER SETS ***

