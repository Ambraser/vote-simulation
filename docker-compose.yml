services:
  vote-sim-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: vote-simulation-ui:latest
    container_name: vote-simulation-ui
    restart: unless-stopped
    init: true
    ports:
      - "${VOTE_SIM_HOST_PORT:-8501}:8501"
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      VOTE_SIM_OUTPUT_BASE_PATH: "/data"
    volumes:
      - ./docker-data:/data
      - ./config:/app/config:ro
    mem_limit: 16g
    cpus: 4.0
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
